services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
